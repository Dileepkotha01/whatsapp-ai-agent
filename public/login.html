<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login | WhatsApp AI Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0f0d;
    --surface: #111a15;
    --surface2: #162019;
    --border: #1e3025;
    --accent: #25d366;
    --accent2: #128c7e;
    --accent-dim: rgba(37,211,102,0.12);
    --accent-glow: rgba(37,211,102,0.35);
    --text: #e8f5ed;
    --text-dim: #7aad8f;
    --text-muted: #3d6b50;
    --danger: #ff4f4f;
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Grid noise texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
  }

  .login-card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    margin-bottom: 40px;
  }

  .logo-icon {
    width: 64px; height: 64px;
    background: var(--accent);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    box-shadow: 0 0 32px var(--accent-glow);
  }

  .logo-text h1 {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.5px;
    text-align: center;
  }

  .login-form {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .input-group label {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
  }

  input[type="email"], input[type="password"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 14px 18px;
    outline: none;
    transition: all 0.2s;
  }

  input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-dim); }

  .btn-login {
    margin-top: 12px;
    background: var(--accent);
    color: #0a0f0d;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--sans);
  }

  .btn-login:hover { background: #20c85e; box-shadow: 0 8px 32px var(--accent-glow); transform: translateY(-1px); }
  .btn-login:active { transform: translateY(0); }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  .error-msg {
    background: rgba(255, 79, 79, 0.1);
    border: 1px solid var(--danger);
    color: var(--danger);
    padding: 12px;
    border-radius: 10px;
    font-size: 13px;
    text-align: center;
    display: none;
    animation: shake 0.4s ease-in-out;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .footer-note {
    margin-top: 32px;
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--mono);
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">
    <div class="logo-icon">💬</div>
    <div class="logo-text">
      <h1>Secure Login</h1>
    </div>
  </div>

  <form class="login-form" id="loginForm">
    <div class="input-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" required placeholder="admin@example.com" />
    </div>
    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" required placeholder="••••••••" />
    </div>
    <div class="error-msg" id="errorMsg">Invalid credentials, please try again.</div>
    <button type="submit" class="btn-login" id="loginBtn">Unlock Agent Dashboard</button>
  </form>

  <div class="footer-note">
    WhatsApp AI Agent v1.0.0
  </div>
</div>

<script>
  const form = document.getElementById('loginForm');
  const btn = document.getElementById('loginBtn');
  const error = document.getElementById('errorMsg');

  form.onsubmit = async (e) => {
    e.preventDefault();
    error.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Verifying...';

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();
      if (data.success) {
        window.location.href = '/';
      } else {
        error.textContent = data.error || 'Login failed';
        error.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Unlock Agent Dashboard';
      }
    } catch (err) {
      error.textContent = 'Network error. Try again.';
      error.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Unlock Agent Dashboard';
    }
  };
</script>

</body>
</html>
